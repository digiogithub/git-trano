name: Release Static Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  APP_NAME: git-trano

jobs:
  build-static:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            archive_suffix: linux-amd64-musl
          - target: aarch64-unknown-linux-musl
            archive_suffix: linux-arm64-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build static binary
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--release --locked"

      - name: Strip binary
        run: |
          BIN="target/${{ matrix.target }}/release/${APP_NAME}"
          if command -v llvm-strip >/dev/null 2>&1; then
            llvm-strip "${BIN}" || true
          elif command -v strip >/dev/null 2>&1; then
            strip "${BIN}" || true
          fi

      - name: Package tar.gz
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-dev}"
          OUT_DIR="dist"
          mkdir -p "${OUT_DIR}"
          ARCHIVE="${APP_NAME}-${VERSION}-${{ matrix.archive_suffix }}.tar.gz"

          install -m 0755 "target/${{ matrix.target }}/release/${APP_NAME}" "${OUT_DIR}/${APP_NAME}"
          tar -C "${OUT_DIR}" -czf "${OUT_DIR}/${ARCHIVE}" "${APP_NAME}"
          rm -f "${OUT_DIR}/${APP_NAME}"

          SHA_FILE="${OUT_DIR}/${ARCHIVE}.sha256"
          sha256sum "${OUT_DIR}/${ARCHIVE}" > "${SHA_FILE}"

          echo "archive=${OUT_DIR}/${ARCHIVE}" >> "${GITHUB_OUTPUT}"
          echo "sha=${SHA_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifacts
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.sha }}
          if-no-files-found: error

      - name: Upload assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.sha }}
          generate_release_notes: true

  checksums:
    name: Publish combined checksums
    runs-on: ubuntu-latest
    needs: build-static
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build combined checksum file
        shell: bash
        run: |
          set -euo pipefail
          find artifacts -type f -name "*.sha256" -print0 | sort -z | xargs -0 cat > SHA256SUMS
          cat SHA256SUMS

      - name: Upload SHA256SUMS to release
        uses: softprops/action-gh-release@v2
        with:
          files: SHA256SUMS
